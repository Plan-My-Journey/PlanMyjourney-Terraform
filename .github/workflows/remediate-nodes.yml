name: Remediate - Fix Node Scheduling

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  remediate:
    name: fix nodes + schedule pods
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Scale node group up (4 desired nodes)
        run: |
          ASG_NAME=$(aws eks describe-nodegroup \
            --cluster-name ai-travel-prod \
            --nodegroup-name ai-travel-prod-workers \
            --query 'nodegroup.resources.autoScalingGroups[0].name' \
            --output text)
          echo "ASG: $ASG_NAME"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --desired-capacity 4 \
            --max-size 5

      - name: Wait for new nodes to become Ready
        run: |
          echo "Waiting for at least 3 Ready nodes..."
          for i in $(seq 1 20); do
            READY=$(kubectl get nodes --no-headers | grep -c " Ready " || true)
            echo "  Ready nodes: $READY"
            [ "$READY" -ge 3 ] && echo "Enough nodes ready!" && break
            sleep 30
          done
          kubectl get nodes -o wide

      - name: Delete NotReady ghost nodes
        run: |
          echo "=== Nodes before cleanup ==="
          kubectl get nodes
          echo ""
          echo "Deleting NotReady nodes..."
          kubectl get nodes --no-headers | awk '$2=="NotReady" {print $1}' | xargs -r kubectl delete node --grace-period=0
          echo ""
          echo "=== Nodes after cleanup ==="
          kubectl get nodes

      - name: Force ArgoCD to sync Cluster Autoscaler app
        run: |
          # Apply the CA ArgoCD app directly in case ArgoCD hasn't picked it up
          kubectl apply -f - <<'EOF'
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: platform-cluster-autoscaler
            namespace: argocd
            annotations:
              argocd.argoproj.io/sync-wave: "-3"
          spec:
            project: planmyjourney
            source:
              repoURL: https://kubernetes.github.io/autoscaler
              chart: cluster-autoscaler
              targetRevision: 9.46.6
              helm:
                releaseName: cluster-autoscaler
                values: |
                  autoDiscovery:
                    clusterName: ai-travel-prod
                  awsRegion: us-east-1
                  rbac:
                    create: true
                    serviceAccount:
                      create: true
                      name: cluster-autoscaler
                      annotations:
                        eks.amazonaws.com/role-arn: arn:aws:iam::235270183260:role/ai-travel-prod-cluster-autoscaler
                  extraArgs:
                    balance-similar-node-groups: true
                    skip-nodes-with-system-pods: false
                    expander: least-waste
                    scale-down-delay-after-add: 10m
                    scale-down-unneeded-time: 10m
                    scale-down-utilization-threshold: "0.5"
                    max-node-provision-time: 15m
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
            destination:
              server: https://kubernetes.default.svc
              namespace: kube-system
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - ServerSideApply=true
          EOF
          # Trigger ArgoCD sync via annotation
          kubectl annotate application platform-cluster-autoscaler \
            -n argocd \
            argocd.argoproj.io/refresh=normal \
            --overwrite 2>/dev/null || echo "Could not annotate (ArgoCD may not be running yet)"

      - name: Wait for pods to schedule
        run: |
          echo "Waiting 90s for pods to reschedule..."
          sleep 90
          echo ""
          echo "=== FINAL POD STATUS ==="
          kubectl get pods -n prod -o wide
          echo ""
          echo "=== NODES ==="
          kubectl get nodes
          echo ""
          echo "=== user-service logs ==="
          kubectl logs -n prod -l app.kubernetes.io/name=user-service --tail=30 --all-containers 2>/dev/null || echo "No logs"
