name: Cleanup Cluster - Remove KEDA, Karpenter, Scale Down Dev

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1
      - uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0
      - run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Force-remove KEDA
        run: |
          echo "=== Force-removing KEDA ==="
          # Delete KEDA CRDs first to avoid webhook deadlock
          kubectl delete crd \
            scaledobjects.keda.sh \
            scaledjobs.keda.sh \
            triggerauthentications.keda.sh \
            clustertriggerauthentications.keda.sh \
            kedacontrollers.keda.sh 2>/dev/null || echo "Some CRDs not found"

          # Remove webhook configurations that block deletion
          kubectl delete validatingwebhookconfigurations keda-admission --ignore-not-found=true 2>/dev/null || true
          kubectl delete mutatingwebhookconfigurations keda-admission --ignore-not-found=true 2>/dev/null || true

          # Patch out finalizers on namespace if stuck
          kubectl get namespace keda -o json 2>/dev/null | \
            sed 's/"finalizers": \[[^]]*\]/"finalizers": []/' | \
            kubectl replace --raw /api/v1/namespaces/keda/finalize -f - 2>/dev/null || true

          kubectl delete namespace keda --ignore-not-found=true --timeout=30s 2>/dev/null || \
            echo "Namespace may already be terminating - continuing"
          echo "KEDA removed"

      - name: Force-remove Karpenter
        run: |
          echo "=== Force-removing Karpenter (replaced by ClusterAutoscaler) ==="
          # Remove all Karpenter resources and their finalizers
          for resource in $(kubectl get crd | grep karpenter | awk '{print $1}'); do
            echo "Removing finalizers from all $resource objects..."
            kubectl get "$resource" --all-namespaces -o json 2>/dev/null | \
              node -e "
const c=[];process.stdin.on('data',x=>c.push(x));process.stdin.on('end',()=>{
  try {
    const d=JSON.parse(c.join(''));
    d.items.forEach(i=>console.log(i.metadata.namespace||'cluster',i.metadata.name));
  } catch(e) {}
});" | while read ns name; do
              kubectl patch "$resource" "$name" -n "$ns" --type=json \
                -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            kubectl delete crd "$resource" --ignore-not-found=true 2>/dev/null || true
          done

          # Remove all resources in karpenter namespace
          kubectl delete all --all -n karpenter --grace-period=0 --force 2>/dev/null || true

          # Start deletion
          kubectl delete namespace karpenter --ignore-not-found=true &
          sleep 5

          # Patch finalizers out of the terminating namespace
          kubectl get namespace karpenter -o json 2>/dev/null | \
            node -e "
const c=[];process.stdin.on('data',x=>c.push(x));process.stdin.on('end',()=>{
  try{const d=JSON.parse(c.join(''));d.spec.finalizers=[];process.stdout.write(JSON.stringify(d));}catch(e){}
});" | kubectl replace --raw /api/v1/namespaces/karpenter/finalize -f - 2>/dev/null || true

          echo "Karpenter removed"

      - name: Scale dev deployments to 1 replica each
        run: |
          echo "=== Scaling dev namespace to 1 replica per service ==="
          for deploy in ai-service frontend travel-service user-service utility-service ai-worker; do
            kubectl scale deployment/$deploy -n dev --replicas=1 2>/dev/null && echo "Scaled $deploy to 1" || echo "Skipped $deploy (not found)"
          done

      - name: Scale node group from 6 to 4
        run: |
          echo "=== Scaling node group down to 4 desired ==="
          ASG_NAME=$(aws eks describe-nodegroup \
            --cluster-name ai-travel-prod \
            --nodegroup-name ai-travel-prod-workers-v2 \
            --query 'nodegroup.resources.autoScalingGroups[0].name' \
            --output text)
          echo "ASG: $ASG_NAME"
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --desired-capacity 4 \
            --min-size 2 \
            --max-size 6
          echo "Scaled to 4 desired nodes"

      - name: Wait and show pod counts
        run: |
          echo "Waiting 30s for pods to settle..."
          sleep 30
          echo ""
          echo "=== Pod count per namespace ==="
          kubectl get pods --all-namespaces --no-headers | awk '{print $1}' | sort | uniq -c | sort -rn
          echo ""
          echo "=== Node status ==="
          kubectl get nodes -o wide
          echo ""
          echo "=== Prod pods ==="
          kubectl get pods -n prod
          echo ""
          echo "=== Dev pods ==="
          kubectl get pods -n dev
