name: Check Pod Status

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: check pod status
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Pod status (prod)
        run: |
          echo "=== PODS ==="
          kubectl get pods -n prod -o wide
          echo ""
          echo "=== RECENT EVENTS ==="
          kubectl get events -n prod --sort-by='.lastTimestamp' | tail -20
          echo ""
          echo "=== user-service logs (last 30 lines) ==="
          kubectl logs -n prod -l app.kubernetes.io/name=user-service --tail=30 --all-containers 2>/dev/null || echo "No logs yet"
