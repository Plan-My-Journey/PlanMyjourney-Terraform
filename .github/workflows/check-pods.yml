name: Check Pod Status

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: check pod status
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Node status
        run: |
          echo "=== NODES ==="
          kubectl get nodes -o wide
          echo ""
          echo "=== NODE CONDITIONS ==="
          kubectl get nodes -o json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          for n in data['items']:
            name=n['metadata']['name']
            conds={c['type']:c['status'] for c in n['status'].get('conditions',[])}
            taints=[t['key']+'='+t.get('value','')+'('+t['effect']+')' for t in n['spec'].get('taints',[])]
            print(f'{name}: Ready={conds.get(\"Ready\",\"?\")} taints={taints}')
          "

      - name: Karpenter NodeClaims (if exist)
        run: |
          echo "=== KARPENTER NODECLAIMS ==="
          kubectl get nodeclaims 2>/dev/null || echo "No NodeClaims CRD found"
          echo ""
          echo "=== KARPENTER NODEPOOLS ==="
          kubectl get nodepools 2>/dev/null || echo "No NodePools CRD found"

      - name: Pod status (prod)
        run: |
          echo "=== PODS (prod) ==="
          kubectl get pods -n prod -o wide
          echo ""
          echo "=== RECENT EVENTS (prod) ==="
          kubectl get events -n prod --sort-by='.lastTimestamp' | tail -25
          echo ""
          echo "=== user-service logs (last 50 lines) ==="
          kubectl logs -n prod -l app.kubernetes.io/name=user-service --tail=50 --all-containers 2>/dev/null || echo "No logs yet"

      - name: Cluster Autoscaler status
        run: |
          echo "=== CA POD ==="
          kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-cluster-autoscaler 2>/dev/null || \
            kubectl get pods -n kube-system -l app=cluster-autoscaler 2>/dev/null || echo "CA pod not found by label"
          echo ""
          echo "=== CA LOGS (last 30 lines) ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=aws-cluster-autoscaler --tail=30 2>/dev/null || \
            kubectl logs -n kube-system -l app=cluster-autoscaler --tail=30 2>/dev/null || echo "No CA logs"
