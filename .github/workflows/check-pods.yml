name: Check Pod Status

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: check pod status
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Node status
        run: |
          echo "=== NODES ==="
          kubectl get nodes -o wide

      - name: Pod status (prod)
        run: |
          echo "=== PODS (prod) ==="
          kubectl get pods -n prod -o wide
          echo ""
          echo "=== RECENT EVENTS (prod) ==="
          kubectl get events -n prod --sort-by='.lastTimestamp' | tail -15

      - name: user-service logs
        run: |
          echo "=== user-service logs (last 30 lines) ==="
          kubectl logs -n prod -l app.kubernetes.io/name=user-service --tail=30 --all-containers 2>/dev/null || echo "No logs"

      - name: travel-service logs
        run: |
          echo "=== travel-service logs (last 40 lines) ==="
          kubectl logs -n prod -l app.kubernetes.io/name=travel-service --tail=40 --all-containers 2>/dev/null || echo "No logs"

      - name: Cluster Autoscaler status
        run: |
          echo "=== CA POD ==="
          kubectl get pods -n kube-system | grep -i autoscaler || echo "No CA pod found"
          echo ""
          echo "=== CA LOGS ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=aws-cluster-autoscaler --tail=20 2>/dev/null || \
            kubectl logs -n kube-system -l app=cluster-autoscaler --tail=20 2>/dev/null || echo "No CA logs"
