name: Create Separate DBs and Fix Service Secrets

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix-db:
    name: create dbs + fix secrets
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Write DB creation script
        run: |
          cat > /tmp/create_dbs.py << 'PYEOF'
          import os, re, sys

          db_url = os.environ.get('DATABASE_URL', '')
          if not db_url:
              print('ERROR: DATABASE_URL not set')
              sys.exit(1)

          admin_url = re.sub(r'/[^/?]+(\?|$)', '/postgres', db_url)
          print('Connecting to admin db: ' + re.sub(r':.*@', ':***@', admin_url))

          try:
              import psycopg
              conn = psycopg.connect(admin_url, autocommit=True)
              cur = conn.cursor()
              for db in ('user_db', 'travel_db'):
                  cur.execute('SELECT 1 FROM pg_database WHERE datname = %s', (db,))
                  if cur.fetchone():
                      print('Database already exists: ' + db)
                  else:
                      cur.execute('CREATE DATABASE ' + db)
                      print('Created database: ' + db)
              cur.close()
              conn.close()
              print('Done.')
          except Exception as e:
              print('ERROR: ' + str(e))
              sys.exit(1)
          PYEOF
          echo "Script written."

      - name: Create user_db and travel_db via running pod
        run: |
          POD=$(kubectl get pods -n prod -l app.kubernetes.io/name=user-service \
            --field-selector=status.phase=Running \
            --no-headers -o custom-columns=NAME:.metadata.name | head -1)

          if [ -z "$POD" ]; then
            echo "No running user-service pod found!"
            kubectl get pods -n prod
            exit 1
          fi
          echo "Using pod: $POD"

          kubectl cp /tmp/create_dbs.py prod/$POD:/tmp/create_dbs.py
          kubectl exec -n prod "$POD" -- python3 /tmp/create_dbs.py

      - name: Fetch AWS secrets and build DB URLs
        run: |
          JWT=$(aws secretsmanager get-secret-value \
            --secret-id ai-travel/jwt-secret/prod \
            --query SecretString --output text)

          RDS_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ai-travel/rds/master-password/prod \
            --query SecretString --output text)
          RDS_USER=$(echo "$RDS_JSON" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["username"])')
          RDS_PASS=$(echo "$RDS_JSON" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["password"])')

          RDS_HOST=$(aws rds describe-db-instances \
            --region us-east-1 \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)

          RDS_PASS_ENC=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=""))' "$RDS_PASS")

          USER_DB_URL="postgresql+psycopg://${RDS_USER}:${RDS_PASS_ENC}@${RDS_HOST}:5432/user_db"
          TRAVEL_DB_URL="postgresql+psycopg://${RDS_USER}:${RDS_PASS_ENC}@${RDS_HOST}:5432/travel_db"

          GEO_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ai-travel/third-party-apis/prod \
            --query SecretString --output text)
          GEOAPIFY=$(echo "$GEO_JSON" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("GEOAPIFY_API_KEY","REPLACE_ME"))')

          OW="REPLACE_ME"
          OW_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ai-travel/openweather-api-key/prod \
            --query SecretString --output text 2>/dev/null || echo '{}')
          OW_VAL=$(echo "$OW_JSON" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("OPENWEATHER_API_KEY","REPLACE_ME"))' 2>/dev/null || echo "REPLACE_ME")
          [ "$OW_VAL" != "REPLACE_ME" ] && OW="$OW_VAL"

          echo "RDS host: $RDS_HOST"
          echo "USER_DB_URL (masked): $(echo $USER_DB_URL | sed 's/:.*@/:***@/')"
          echo "TRAVEL_DB_URL (masked): $(echo $TRAVEL_DB_URL | sed 's/:.*@/:***@/')"

          echo "JWT=$JWT" >> "$GITHUB_ENV"
          echo "USER_DB_URL=$USER_DB_URL" >> "$GITHUB_ENV"
          echo "TRAVEL_DB_URL=$TRAVEL_DB_URL" >> "$GITHUB_ENV"
          echo "GEOAPIFY=$GEOAPIFY" >> "$GITHUB_ENV"
          echo "OW=$OW" >> "$GITHUB_ENV"

      - name: Update Kubernetes secrets with per-service databases
        run: |
          for NS in prod dev; do
            kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic user-service-secrets \
              --namespace "$NS" \
              --from-literal=jwt_secret_key="$JWT" \
              --from-literal=database_url="$USER_DB_URL" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic travel-service-secrets \
              --namespace "$NS" \
              --from-literal=jwt_secret_key="$JWT" \
              --from-literal=database_url="$TRAVEL_DB_URL" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic ai-service-secrets \
              --namespace "$NS" \
              --from-literal=jwt_secret_key="$JWT" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic utility-service-secrets \
              --namespace "$NS" \
              --from-literal=jwt_secret_key="$JWT" \
              --from-literal=openweather_api_key="$OW" \
              --from-literal=geoapify_api_key="$GEOAPIFY" \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Secrets updated in namespace: $NS"
          done

      - name: Restart user-service and travel-service
        run: |
          kubectl rollout restart deployment/user-service -n prod
          kubectl rollout restart deployment/travel-service -n prod

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/user-service -n prod --timeout=300s || true
          kubectl rollout status deployment/travel-service -n prod --timeout=300s || true

      - name: Final pod status and logs
        run: |
          echo "=== PODS ==="
          kubectl get pods -n prod -o wide
          echo ""
          echo "=== user-service logs ==="
          kubectl logs -n prod -l app.kubernetes.io/name=user-service --tail=20 --all-containers 2>/dev/null || echo "No logs"
          echo ""
          echo "=== travel-service logs ==="
          kubectl logs -n prod -l app.kubernetes.io/name=travel-service --tail=20 --all-containers 2>/dev/null || echo "No logs"
