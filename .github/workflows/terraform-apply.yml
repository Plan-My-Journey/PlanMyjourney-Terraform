name: Terraform

# Terraform manages PRODUCTION infrastructure only.
#   push to main         -> fmt -> validate -> plan -> apply  (prod, gated by the
#                           `production` GitHub environment)
#   pull_request to main -> fmt -> validate -> plan           (no apply)
#
# There is no separate DEV AWS stack: "dev" is the `dev` Kubernetes namespace in
# the shared `ai-travel-prod` cluster and is managed by GitOps/Helm (ArgoCD), NOT
# Terraform. Hence there is no dev Terraform lane and no dev/terraform.tfstate.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.tf"
      - "environments/prod.tfvars"
      - ".github/workflows/terraform-apply.yml"
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - "environments/prod.tfvars"
      - ".github/workflows/terraform-apply.yml"

# Granted at the caller so the reusable workflow's jobs can request them
# (a reusable workflow's job permissions cannot exceed what the caller grants).
permissions:
  id-token: write # OIDC federation for AWS (aws-actions/configure-aws-credentials)
  contents: read # checkout
  pull-requests: write # plan job (PR plan output / comment scope)

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_terraform.yml@main
    with:
      environment: production
      action: ${{ github.event_name == 'push' && 'apply' || 'plan' }}
      tfvars_file: environments/prod.tfvars
    secrets:
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
