name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.tf"
      - "environments/**"
  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment
        required: true
        type: choice
        options: [dev, prod]
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan, apply]
        default: plan

jobs:
  terraform-dev:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'dev')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_terraform.yml@main
    with:
      environment: dev
      action: plan
      tfvars_file: environments/dev.tfvars
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  terraform-prod-plan:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan' && github.event.inputs.target_env == 'prod')
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_terraform.yml@main
    with:
      environment: production
      action: plan
      tfvars_file: environments/prod.tfvars
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  terraform-prod-apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.target_env == 'prod'
    uses: Plan-My-Journey/PlanMyJourney-Workflows/.github/workflows/_terraform.yml@main
    with:
      environment: production
      action: apply
      tfvars_file: environments/prod.tfvars
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
