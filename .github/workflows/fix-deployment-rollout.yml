name: Fix Stuck Rollout - Clear CrashLoop Pods

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    name: rollback travel + complete user-service rollout
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ai-travel-prod

      - name: Roll back travel-service to previous working version
        run: |
          echo "Rolling back travel-service..."
          kubectl rollout undo deployment/travel-service -n prod
          echo "Waiting for rollback to stabilize..."
          sleep 15

      - name: Scale user-service to 1 replica to free slot for new image
        run: |
          echo "Temporarily scaling user-service to 1 replica..."
          kubectl scale deployment/user-service --replicas=1 -n prod
          sleep 5
          echo "Restoring user-service to 2 replicas..."
          kubectl scale deployment/user-service --replicas=2 -n prod

      - name: Wait for user-service v1.0.2 rollout
        run: |
          echo "Waiting for user-service rollout to complete..."
          kubectl rollout status deployment/user-service -n prod --timeout=300s || true

      - name: Final pod status
        run: |
          echo "=== PODS ==="
          kubectl get pods -n prod -o wide
          echo ""
          echo "=== user-service logs ==="
          kubectl logs -n prod -l app.kubernetes.io/name=user-service --tail=20 --all-containers 2>/dev/null || echo "No logs"
